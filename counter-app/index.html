<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Counter app</title>
  </head>
  <body>
    <div class="container">
      <h2>Counter App</h2>
      <div class="count">
        <p id="number-display">0</p>
      </div>
      <div class="show">
        <button id="increase" onclick="add()">Increase</button>
        <button id="decrease" onclick="sub()">Decrease</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
